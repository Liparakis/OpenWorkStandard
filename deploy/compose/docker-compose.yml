services:
  postgres:
    image: postgres:17
    container_name: ows-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ows_verifier}
      POSTGRES_USER: ${POSTGRES_USER:-ows}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ows-verifier:
    image: ${OWS_VERIFIER_IMAGE:-ows-verifier:latest}
    container_name: ows-verifier-prod
    restart: always
    ports:
      - "${VERIFIER_PORT:-5078}:8080"
    environment:
      - VerifierEnvironment=${VerifierEnvironment:-Production}
      - VerifierStorage__Provider=${VerifierStorage__Provider:-postgres}
      - VerifierStorage__PostgresConnectionString=${VerifierStorage__PostgresConnectionString}
      - VerifierStorage__LocalStoragePath=${VerifierStorage__LocalStoragePath:-/app/packages}
      - VerifierSecurity__ApiKey=${VerifierSecurity__ApiKey}
      - VerifierSecurity__SigningKey=${VerifierSecurity__SigningKey}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - verifier-packages:${VerifierStorage__LocalStoragePath:-/app/packages}
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
    name: ows-postgres-data-prod
  verifier-packages:
    name: ows-verifier-package-data
