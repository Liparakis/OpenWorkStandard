global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ows-verifier
    metrics_path: /metrics
    static_configs:
      - targets: ["ows-verifier:8080"]
        labels:
          service: "ows-verifier"
          instance: "ows-verifier-prod"
          deployment: "self-hosted"
