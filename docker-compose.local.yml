services:
  postgres:
    image: postgres:17
    container_name: ows-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ows_verifier
      POSTGRES_USER: ows
      POSTGRES_PASSWORD: ows-dev
    ports:
      - "5432:5432"
    volumes:
      - D:\Containers\OWS\postgres\data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ows -d ows_verifier"]
      interval: 5s
      timeout: 5s
      retries: 10
